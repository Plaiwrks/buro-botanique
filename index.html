    <!-- Google Analytics GA4 — wordt alleen geladen als VITE_GA_MEASUREMENT_ID is ingesteld -->
    <script>
      window.__GA_ID__ = '%VITE_GA_MEASUREMENT_ID%' !== '' && !('%VITE_GA_MEASUREMENT_ID%'.startsWith('%')) ? '%VITE_GA_MEASUREMENT_ID%' : null;
      if (window.__GA_ID__) {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + window.__GA_ID__;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', window.__GA_ID__, { send_page_view: false });
      }
    </script>
